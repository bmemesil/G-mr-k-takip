<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GümrükPortal - Cloud Enterprise</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --primary-dark: #4f46e5; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --dark: #1e293b; --light: #f8fafc; --sidebar-width: 260px; --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; color: var(--dark); min-height: 100vh; display: flex; }
        
        /* GİRİŞ */
        #login-page { position: fixed; inset: 0; background: #0f172a; display: none; align-items: center; justify-content: center; z-index: 9999; }
        #login-page.active { display: flex; }
        .login-card { background: white; padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 400px; text-align: center; }
        .login-input { width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 0.5rem; outline: none; }
        .login-btn { width: 100%; padding: 1rem; background: var(--primary); color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; }

        /* PANEL */
        #main-content { display: none; width: 100%; }
        #main-content.active { display: flex; }
        .sidebar { width: var(--sidebar-width); background: var(--dark); color: white; height: 100vh; position: fixed; padding: 1.5rem; }
        .nav-item { padding: 1rem; border-radius: 0.5rem; color: #94a3b8; cursor: pointer; display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
        .nav-item.active { background: var(--primary); color: white; }
        .main-wrapper { margin-left: var(--sidebar-width); flex: 1; padding: 2rem; }
        
        /* TABLO & KART */
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 1rem; text-align: left; border-bottom: 1px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 0.25rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; font-weight: 600; background: #dcfce7; color: #166534; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 1rem; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .modal-body { padding: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; margin-bottom: 0.3rem; color: #64748b; }
        .form-group input { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 0.4rem; }
        
        #sync-toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--dark); color: white; padding: 1rem; border-radius: 0.5rem; display: none; z-index: 3000; }
        .page-content { display: none; }
        .page-content.active { display: block; }
    </style>
</head>
<body>

    <div id="login-page" class="active">
        <div class="login-card">
            <h2>GümrükPortal</h2>
            <p style="margin-bottom: 1.5rem; color: #64748b;">Giriş Yapın</p>
            <input type="text" id="login-user" class="login-input" placeholder="Kullanıcı Adı" value="admin">
            <input type="password" id="login-pass" class="login-input" placeholder="Şifre" value="123456">
            <button class="login-btn" onclick="checkLogin()">Giriş Yap</button>
        </div>
    </div>

    <div id="main-content">
        <aside class="sidebar">
            <h3 style="margin-bottom: 2rem;"><i class="fas fa-box-open"></i> GümrükPortal</h3>
            <div class="nav-item active" id="nav-decl" onclick="switchPage('decl')"><i class="fas fa-list"></i> Gelen Araçlar</div>
            <div class="nav-item" id="nav-kiymet" onclick="switchPage('kiymet')"><i class="fas fa-file-invoice-dollar"></i> Kıymet Listesi</div>
            <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</div>
        </aside>

        <main class="main-wrapper">
            <div id="page-decl" class="page-content active">
                <div style="display: flex; justify-content: space-between;">
                    <h1>Gelen Araçlar</h1>
                    <button class="login-btn" style="width: auto; padding: 0.6rem 1.2rem;" onclick="openModal('decl')"><i class="fas fa-plus"></i> Yeni Araç</button>
                </div>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Firma</th><th>Araç Bilgisi</th><th>Şasi No</th><th>Durum</th></tr>
                        </thead>
                        <tbody id="decl-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="page-kiymet" class="page-content">
                <div style="display: flex; justify-content: space-between;">
                    <h1>Kıymet Listesi</h1>
                    <button class="login-btn" style="width: auto; padding: 0.6rem 1.2rem; background: var(--success);" onclick="openModal('kiymet')"><i class="fas fa-plus"></i> Yeni Kıymet</button>
                </div>
                <div class="card">
                    <table>
                        <thead>
                            <tr><th>Marka/Model</th><th>Şasi No</th><th>Fatura/Kıymet</th><th>İşlem</th></tr>
                        </thead>
                        <tbody id="kiymet-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-decl" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><h3>Yeni Araç Kaydı</h3><button onclick="closeModal('decl')">X</button></div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group"><label>Firma</label><input type="text" id="d-firma"></div>
                    <div class="form-group"><label>Marka</label><input type="text" id="d-marka"></div>
                    <div class="form-group"><label>Model</label><input type="text" id="d-model"></div>
                    <div class="form-group"><label>Şasi</label><input type="text" id="d-sasi"></div>
                    <div class="form-group"><label>Tarih</label><input type="date" id="d-tarih"></div>
                    <div class="form-group"><label>Antrepo Tarihi</label><input type="date" id="d-ant"></div>
                    <div class="form-group"><label>Beyanname/CIF</label><input type="text" id="d-cif"></div>
                    <div class="form-group"><label>Kıymet VV</label><input type="text" id="d-vv"></div>
                    <div class="form-group"><label>Kıymet GT</label><input type="text" id="d-gt"></div>
                    <div class="form-group"><label>Evrak No</label><input type="text" id="d-evrak"></div>
                </div>
                <button class="login-btn" style="margin-top: 1.5rem;" onclick="saveDecl()">Buluta Kaydet</button>
            </div>
        </div>
    </div>

    <div id="modal-kiymet" class="modal-overlay">
        <div class="modal">
            <div class="modal-header"><h3>Yeni Kıymet Kaydı</h3><button onclick="closeModal('kiymet')">X</button></div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group"><label>Marka/Model</label><input type="text" id="k-marka"></div>
                    <div class="form-group"><label>Şasi No</label><input type="text" id="k-sasi"></div>
                    <div class="form-group"><label>Fatura No</label><input type="text" id="k-fatura"></div>
                    <div class="form-group"><label>Kıymet Tutarı</label><input type="text" id="k-tutar"></div>
                </div>
                <button class="login-btn" style="margin-top: 1.5rem; background: var(--success);" onclick="saveKiymet()">Kıymeti Kaydet</button>
            </div>
        </div>
    </div>

    <div id="sync-toast">İşlem yapılıyor...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxlTVb_JsefQHCE8pFiOiDjMaEVZJNiI0",
            authDomain: "gumruk-portal.firebaseapp.com",
            databaseURL: "https://gumruk-portal-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gumruk-portal",
            appId: "1:782266851006:web:30aa74f32f2ed36da4c8ef"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // PANEL YÖNETİMİ
        window.checkLogin = () => {
            if(document.getElementById('login-user').value === 'admin' && document.getElementById('login-pass').value === '123456') {
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('main-content').classList.add('active');
            } else alert("Hatalı!");
        };

        window.switchPage = (p) => {
            document.querySelectorAll('.page-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('nav-'+p).classList.add('active');
        };

        window.openModal = (m) => document.getElementById('modal-'+m).classList.add('active');
        window.closeModal = (m) => document.getElementById('modal-'+m).classList.remove('active');

        // VERİ KAYIT
        window.saveDecl = async () => {
            const d = {
                firma: document.getElementById('d-firma').value,
                marka: document.getElementById('d-marka').value,
                model: document.getElementById('d-model').value,
                sasi: document.getElementById('d-sasi').value,
                tarih: document.getElementById('d-tarih').value,
                ant: document.getElementById('d-ant').value,
                cif: document.getElementById('d-cif').value,
                vv: document.getElementById('d-vv').value,
                gt: document.getElementById('d-gt').value,
                evrak: document.getElementById('d-evrak').value
            };
            await set(push(ref(db, 'declarations')), d);
            closeModal('decl');
        };

        window.saveKiymet = async () => {
            const k = {
                marka: document.getElementById('k-marka').value,
                sasi: document.getElementById('k-sasi').value,
                fatura: document.getElementById('k-fatura').value,
                tutar: document.getElementById('k-tutar').value
            };
            await set(push(ref(db, 'kiymet_listesi')), k);
            closeModal('kiymet');
        };

        // ANLIK DİNLEME
        onValue(ref(db, 'declarations'), (s) => {
            const b = document.getElementById('decl-body'); b.innerHTML = '';
            s.forEach(c => {
                const v = c.val();
                b.innerHTML += `<tr><td><b>${v.firma}</b></td><td>${v.marka} ${v.model}</td><td><code>${v.sasi}</code></td><td><span class="badge">Bulutta</span></td></tr>`;
            });
        });

        onValue(ref(db, 'kiymet_listesi'), (s) => {
            const b = document.getElementById('kiymet-body'); b.innerHTML = '';
            s.forEach(c => {
                const v = c.val();
                b.innerHTML += `<tr><td>${v.marka}</td><td><code>${v.sasi}</code></td><td>${v.fatura} / ${v.tutar}</td><td><i class="fas fa-check-circle" style="color:var(--success)"></i></td></tr>`;
            });
        });
    </script>
</body>
</html>
