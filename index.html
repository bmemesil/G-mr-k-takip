<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GümrükPortal - Kurumsal SaaS Yönetim Paneli</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --dark: #1e293b;
            --light: #f8fafc;
            --sidebar-width: 260px;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f1f5f9; color: var(--dark); min-height: 100vh; display: flex; overflow-x: hidden; }

        /* GİRİŞ SAYFASI */
        #login-page {
            position: fixed; inset: 0; background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        #login-page.active { display: flex; }
        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); padding: 2.5rem;
            border-radius: 1.5rem; width: 100%; max-width: 420px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); text-align: center; color: white;
        }
        .login-logo { width: 64px; height: 64px; background: linear-gradient(135deg, var(--primary), #a855f7); border-radius: 1rem; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .login-input { width: 100%; padding: 0.875rem 1.25rem; border-radius: 0.75rem; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: white; margin-bottom: 1rem; outline: none; transition: var(--transition); }
        .login-input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }
        .login-btn { width: 100%; padding: 1rem; border-radius: 0.75rem; border: none; background: linear-gradient(to right, var(--primary), var(--primary-dark)); color: white; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }

        /* ANA İÇERİK */
        #main-content { display: none; width: 100%; flex-direction: column; }
        #main-content.active { display: flex; }

        /* SİDEBAR */
        .sidebar { width: var(--sidebar-width); background: var(--dark); color: white; height: 100vh; position: fixed; left: 0; top: 0; padding: 1.5rem; transition: var(--transition); z-index: 1000; }
        .nav-item { padding: 0.875rem 1rem; border-radius: 0.75rem; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; transition: var(--transition); cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.1); color: white; }
        .nav-item i { width: 20px; font-size: 1.1rem; }

        /* CONTENT AREA */
        .main-wrapper { margin-left: var(--sidebar-width); flex: 1; padding: 2rem; min-width: 0; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .btn { padding: 0.625rem 1.25rem; border-radius: 0.75rem; border: none; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem; transition: var(--transition); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        /* TABLO TASARIMI */
        .card { background: white; border-radius: 1rem; box-shadow: var(--card-shadow); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 1rem; font-weight: 600; color: var(--secondary); border-bottom: 1px solid #e2e8f0; font-size: 0.875rem; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        tr:hover { background: #f8fafc; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 1.5rem; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 1.25rem; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 1.5rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.25rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--secondary); }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; outline: none; }

        /* TOAST (BİLDİRİM) */
        #sync-toast { position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem; border-radius: 1rem; background: var(--dark); color: white; display: none; align-items: center; gap: 0.75rem; z-index: 3000; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="login-page" class="active">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-box-open"></i></div>
            <h2 style="margin-bottom: 0.5rem">GümrükPortal</h2>
            <p style="color: #94a3b8; margin-bottom: 2rem; font-size: 0.875rem">Kurumsal SaaS Yönetim Paneli</p>
            <input type="text" id="login-user" class="login-input" placeholder="Kullanıcı Adı" value="admin">
            <input type="password" id="login-pass" class="login-input" placeholder="Şifre" value="123456">
            <button class="login-btn" onclick="checkLogin()">Sisteme Giriş Yap</button>
        </div>
    </div>

    <div id="main-content">
        <aside class="sidebar">
            <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; padding: 0.5rem;">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-box-open" style="font-size: 0.8rem;"></i></div>
                <span style="font-weight: 700; font-size: 1.1rem; letter-spacing: -0.5px;">GümrükPortal</span>
            </div>
            <nav>
                <div class="nav-item active" onclick="switchPage('decl')"><i class="fas fa-list"></i> Gelen Araçlar</div>
                <div class="nav-item" onclick="switchPage('kiymet')"><i class="fas fa-file-invoice-dollar"></i> Kıymet Listesi</div>
                <div class="nav-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</div>
            </nav>
        </aside>

        <main class="main-wrapper">
            <div id="page-decl" class="page-content active">
                <div class="page-header">
                    <h1>Gelen Araçlar</h1>
                    <button class="btn btn-primary" onclick="openDeclModal()"><i class="fas fa-plus"></i> Yeni Kayıt</button>
                </div>
                <div class="card">
                    <table id="decl-table">
                        <thead>
                            <tr>
                                <th>Firma</th>
                                <th>Marka/Model</th>
                                <th>Şasi No</th>
                                <th>Tarih</th>
                                <th>İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="decl-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="decl-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Araç Kaydı</h3>
                <button onclick="closeModal()" style="background: none; border: none; cursor: pointer; font-size: 1.5rem;">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-grid">
                    <div class="form-group"><label>Firma Adı</label><input type="text" id="da-firma"></div>
                    <div class="form-group"><label>Marka</label><input type="text" id="da-marka"></div>
                    <div class="form-group"><label>Model</label><input type="text" id="da-model"></div>
                    <div class="form-group"><label>Şasi No</label><input type="text" id="da-sase"></div>
                    <div class="form-group"><label>Tarih</label><input type="date" id="da-tarih"></div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    <button class="btn" style="background: #e2e8f0;" onclick="closeModal()">İptal</button>
                    <button class="btn btn-primary" onclick="saveData()">Kaydet</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sync-toast"><i class="fas fa-spinner fa-spin"></i> <span id="toast-text">İşlem yapılıyor...</span></div>

    <script>
        // TEMEL PANEL FONKSİYONLARI
        function checkLogin() {
            const u = document.getElementById('login-user').value;
            const p = document.getElementById('login-pass').value;
            if (u === 'admin' && p === '123456') {
                document.getElementById('login-page').style.display = 'none';
                document.getElementById('main-content').classList.add('active');
            } else {
                alert('Kullanıcı adı veya şifre hatalı!');
            }
        }

        function openDeclModal() { document.getElementById('decl-modal').classList.add('active'); }
        function closeModal() { document.getElementById('decl-modal').classList.remove('active'); }

        function showToast(text, isDone = false) {
            const t = document.getElementById('sync-toast');
            document.getElementById('toast-text').innerText = text;
            t.style.display = 'flex';
            if (isDone) setTimeout(() => t.style.display = 'none', 2000);
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDxlTVb_JsefQHCE8pFiOiDjMaEVZJNiI0",
            authDomain: "gumruk-portal.firebaseapp.com",
            databaseURL: "https://gumruk-portal-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gumruk-portal",
            storageBucket: "gumruk-portal.firebasestorage.app",
            messagingSenderId: "782266851006",
            appId: "1:782266851006:web:30aa74f32f2ed36da4c8ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // KAYDETME FONKSİYONU
        window.saveData = async function() {
            const data = {
                firma: document.getElementById('da-firma').value,
                marka: document.getElementById('da-marka').value,
                model: document.getElementById('da-model').value,
                sasi: document.getElementById('da-sase').value,
                tarih: document.getElementById('da-tarih').value,
                saveTime: new Date().toISOString()
            };

            if(!data.firma || !data.sasi) { alert("Lütfen zorunlu alanları doldurun!"); return; }

            showToast("Buluta kaydediliyor...");
            try {
                const newRef = push(ref(db, 'declarations'));
                await set(newRef, data);
                showToast("Başarıyla kaydedildi!", true);
                closeModal();
                // Formu temizle
                ['da-firma','da-marka','da-model','da-sase','da-tarih'].forEach(id => document.getElementById(id).value = '');
            } catch (e) {
                console.error(e);
                showToast("Hata oluştu!", true);
            }
        };

        // VERİLERİ ANLIK ÇEKME
        const declRef = ref(db, 'declarations');
        onValue(declRef, (snapshot) => {
            const tbody = document.getElementById('decl-body');
            tbody.innerHTML = '';
            snapshot.forEach((child) => {
                const val = child.val();
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${val.firma}</strong></td>
                    <td>${val.marka} ${val.model}</td>
                    <td><code>${val.sasi}</code></td>
                    <td>${val.tarih}</td>
                    <td><span style="color:var(--success)"><i class="fas fa-check-circle"></i> Bulutta</span></td>
                `;
                tbody.prepend(tr);
            });
        });
    </script>
</body>
</html>
