<script>
    function showSyncToast(text,ok=false){const t=document.getElementById('sync-toast'),ic=document.getElementById('sync-icon');document.getElementById('sync-text').innerText=text;if(ok){ic.style.animation='none';ic.style.border='none';ic.innerHTML='<i data-lucide="check-circle" style="color:var(--success);width:16px;height:16px;"></i>';if(window.lucide)lucide.createIcons();}else{ic.innerHTML='';ic.style.border='2px solid rgba(255,255,255,0.1)';ic.style.borderTopColor='var(--primary)';ic.style.animation='spin 1s linear infinite';}t.classList.add('show');}
    function hideSyncToast(text,ok=true){showSyncToast(text,ok);setTimeout(()=>document.getElementById('sync-toast').classList.remove('show'),2500);}

    window.doLogin=function(){const u=document.getElementById('log-email').value.trim();const p=document.getElementById('log-pass').value;if((u==='admin'&&p==='Bayram2026')||(u==='admin@gumruk.com'&&p==='Bayram2026')){localStorage.setItem('gumruk_auth','true');const s=document.getElementById('login-screen');s.style.opacity='0';s.style.transition='all 0.4s';setTimeout(()=>s.style.display='none',400);}else{document.getElementById('auth-alert').innerText='Hatalı giriş bilgisi.';document.getElementById('auth-alert').style.display='block';}};

    window.declarationsData=[];window.firmData={};window.kiymetData=[];
    window.fixExcelDate=function(v){if(!v)return'';if(typeof v==='number'||(!isNaN(v)&&Number(v)>30000)){try{let d=new Date((Number(v)-25569)*86400*1000);return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;}catch(e){return v;}}if(typeof v==='string'&&v.includes('T')){try{let d=new Date(v);return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;}catch(e){}}return String(v).trim();};
    window.parseTRDate=function(s){if(!s||s.trim().length<8)return null;let p=s.trim().split(/[\.\-\/]/);if(p.length!==3)return null;let d,m,y;if(p[0].length===4){y=parseInt(p[0]);m=parseInt(p[1])-1;d=parseInt(p[2]);}else{d=parseInt(p[0]);m=parseInt(p[1])-1;y=parseInt(p[2]);if(y<100)y+=2000;}let dt=new Date(y,m,d);dt.setHours(0,0,0,0);return isNaN(dt.getTime())?null:dt;};
    window.formatTRDate=function(d){if(!d||isNaN(d.getTime()))return"";return`${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;};
    window.addDays=function(d,n){if(!d)return null;let r=new Date(d);r.setDate(r.getDate()+Number(n));return r;};
    window.diffDaysSigned=function(a,b){if(!a||!b)return 0;return Math.round((Date.UTC(a.getFullYear(),a.getMonth(),a.getDate())-Date.UTC(b.getFullYear(),b.getMonth(),b.getDate()))/(864e5));};
    window.formatNumber=function(v){if(v===null||v===undefined||v==='')return'-';let n=typeof v==='string'?parseFloat(v.replace(/\./g,'').replace(',','.')):v;if(isNaN(n))return v;return n.toLocaleString('tr-TR',{minimumFractionDigits:0,maximumFractionDigits:0});};
    window.formatCurrencyInput=function(i){let c=i.selectionStart,o=i.value;let v=o.replace(/[^0-9,]/g,'');let p=v.split(',');if(p.length>2)v=p[0]+','+p.slice(1).join('');p=v.split(',');let ip=p[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');let nv=p.length>1?ip+','+p[1]:ip;if(o!==nv){i.value=nv;let np=c+(nv.length-o.length);i.setSelectionRange(np,np);}};

    function saveToLocal(){try{localStorage.setItem('gumrukDeclData',JSON.stringify(window.declarationsData));localStorage.setItem('gumrukFirmData',JSON.stringify(window.firmData));localStorage.setItem('gumrukKiymetData',JSON.stringify(window.kiymetData));}catch(e){}}
    function loadFromLocal(){try{let d=localStorage.getItem('gumrukDeclData');if(d&&d!=="null")window.declarationsData=JSON.parse(d);let f=localStorage.getItem('gumrukFirmData');window.firmData=f&&f!=="null"?JSON.parse(f):{"ŞAMNU GT":[],"FF OTOMOTİV":[],"SANDIKÇI":[],"KARABAYIR":[],"ŞAHISLAR":[]};let k=localStorage.getItem('gumrukKiymetData');if(k&&k!=="null")window.kiymetData=JSON.parse(k);}catch(e){}}

    let cloudSaveTimeout=null;
    function saveData(type){
        saveToLocal();showSyncToast("Firebase'e kaydediliyor...");clearTimeout(cloudSaveTimeout);
        cloudSaveTimeout=setTimeout(async()=>{
            if(window._firebaseSave){
                let ok=await window._firebaseSave({decl:window.declarationsData,firm:window.firmData,kiymet:window.kiymetData});
                if(ok)hideSyncToast("Firebase'e kaydedildi!",true);else hideSyncToast("Kayıt başarısız!",false);
            }else{hideSyncToast("Firebase henüz hazır değil",false);}
        },1500);
    }

    window.forceCloudSync=function(){loadAllData();};

    async function loadAllData(){
        showSyncToast("Firebase'den veriler çekiliyor...");
        if(window._firebaseLoad){
            let data=await window._firebaseLoad();
            if(data){
                window.declarationsData=data.decl||[];window.firmData=data.firm||{"ŞAMNU GT":[],"FF OTOMOTİV":[],"SANDIKÇI":[],"KARABAYIR":[],"ŞAHISLAR":[]};window.kiymetData=data.kiymet||[];
                window.declarationsData.forEach(d=>{if(d){d.tarih=window.fixExcelDate(d.tarih);d.kiymVv=window.fixExcelDate(d.kiymVv);d.kiymGt=window.fixExcelDate(d.kiymGt);d.ekSure=window.fixExcelDate(d.ekSure);d.antTarih=window.fixExcelDate(d.antTarih);d.beynmCif=window.fixExcelDate(d.beynmCif);}});
                Object.keys(window.firmData).forEach(fn=>{(window.firmData[fn]||[]).forEach(p=>{if(p)p.tarih=window.fixExcelDate(p.tarih);});});
                window.kiymetData.forEach(k=>{if(k)k.tarih=window.fixExcelDate(k.tarih);});
                saveToLocal();hideSyncToast("Firebase'den çekildi!",true);
            }else{hideSyncToast("Çevrimdışı mod.",false);loadFromLocal();}
        }else{loadFromLocal();hideSyncToast("Firebase bekleniyor...",false);}
        let lv=localStorage.getItem('gumruk_last_view')||'dashboard';
        if(lv==='firmDetails'){let lf=localStorage.getItem('gumruk_last_firm');if(lf&&window.firmData[lf]){window.currentFirm=lf;window.renderView('firmDetails');}else window.renderView('firms');}else window.renderView(lv);
    }

    window._onFirebaseReady=function(){loadAllData();};

    window.exportBackup=function(){let d={decl:window.declarationsData,firm:window.firmData,kiymet:window.kiymetData};let a=document.createElement('a');a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(d));a.download="gumruk_yedek.json";document.body.appendChild(a);a.click();a.remove();};
    window.importBackup=function(event){let file=event.target.files[0];if(!file)return;let r=new FileReader();r.onload=function(e){try{let d=JSON.parse(e.target.result);if(d.decl){window.declarationsData=d.decl;window.kiymetData=d.kiymet||[];if(d.firm)window.firmData=d.firm;saveData('all');alert("Yüklendi!");location.reload();}}catch(err){alert("Hata!");}};r.readAsText(file);document.getElementById('import-backup-file').value="";};

    window.addNewFirm=function(){let n=prompt("Firma Adı:");if(n&&n.trim()){let name=n.trim().toUpperCase();if(!window.firmData[name]){window.firmData[name]=[];saveData('firm');window.renderView('firms');}}};
    window.deleteFirm=function(fn,e){e.stopPropagation();let name=fn.replace(/&quot;/g,'"');if(confirm(`'${name}' firmasını SİL?`)){delete window.firmData[name];saveData('firm');window.renderView('firms');}};
    window.deleteDeclaration=function(i){if(confirm('Sil?')){window.declarationsData.splice(i,1);saveData('decl');window.renderDeclarationsTable();}};
    window.deleteFirmVehicle=function(i){if(confirm('Sil?')){window.firmData[window.currentFirm].splice(i,1);saveData('firm');window.renderFirmVehicles();}};

    window.inlineEditDate=function(el,idx,field){if(el.querySelector('input'))return;let cur=window.declarationsData[idx][field]||'';let iso='';if(cur){let p=cur.split('.');if(p.length===3)iso=`${p[2]}-${p[1]}-${p[0]}`;}el.innerHTML=`<input type="date" value="${iso}" style="padding:4px;height:28px;font-size:12px;" onblur="window.saveInlineDate(this,${idx},'${field}')" onchange="window.saveInlineDate(this,${idx},'${field}')">`;let inp=el.querySelector('input');inp.focus();inp.showPicker&&inp.showPicker();};
    window.saveInlineDate=function(inp,idx,field){let iso=inp.value;let tr='';if(iso){let p=iso.split('-');if(p.length===3)tr=`${p[2]}.${p[1]}.${p[0]}`;}if(window.declarationsData[idx][field]!==tr){window.declarationsData[idx][field]=tr;saveData('decl');window.renderDeclarationsTable();}else{inp.parentElement.innerHTML=tr||'-';}};

    window.calculateVehicleMetrics=function(data){
        let today=new Date();today.setHours(0,0,0,0);
        let E=window.parseTRDate(data.tarih),G=window.parseTRDate(data.ekSure),H=window.parseTRDate(data.antTarih);
        let I=window.parseTRDate(data.beynmCif),J=window.parseTRDate(data.kiymVv),K=window.parseTRDate(data.kiymGt);
        let result={ilkSureSonu:"",klnSonTarih:"",klnGun:"",kiymGecen:"",sonGun:"",ardiye:0,gecenGun:""};
        if(!E)return result;
        let F=window.addDays(E,20);result.ilkSureSonu=window.formatTRDate(F);
        let L_date=null;
        if(I){L_date=window.addDays(I,29);}else if(H){result.klnSonTarih="Süresiz";}else if(G){L_date=window.addDays(G>F?G:F,29);}else{L_date=F;}
        if(L_date)result.klnSonTarih=window.formatTRDate(L_date);
        let kiymGecen=0;
        if(J){if(K){kiymGecen=window.diffDaysSigned(K,J);result.kiymGecen=kiymGecen;}else{result.kiymGecen="Kıymette";}}else if(H&&!I){result.kiymGecen="Süresiz";}
        let sonGunDate=null;
        if(!J&&!K){result.sonGun=result.klnSonTarih||"";sonGunDate=L_date;}else if(J&&!K){result.sonGun="Kıymette";sonGunDate=null;}else if(J&&K&&L_date){sonGunDate=window.addDays(L_date,kiymGecen);result.sonGun=window.formatTRDate(sonGunDate);}else if(!L_date){result.sonGun="Süresiz";sonGunDate=null;}
        if(result.klnSonTarih==="Süresiz"&&!J&&!K){result.klnGun="Süresiz";}else if(J&&!K){if(L_date){let d=window.diffDaysSigned(L_date,today);result.klnGun=d<0?0:d;}else result.klnGun="Süresiz";}else if(sonGunDate){let d=window.diffDaysSigned(sonGunDate,today);result.klnGun=d<0?0:d;}else if(I){let p30=window.addDays(I,30);result.klnGun=p30>today?window.diffDaysSigned(p30,today):0;}else if(!H&&L_date){let d=window.diffDaysSigned(L_date,today);result.klnGun=d<0?0:d;}else{result.klnGun="Süresiz";}
        let gun=window.diffDaysSigned(today,E)+1;result.gecenGun=gun;
        if(gun>0){if(gun<=20)result.ardiye=gun*145;else if(gun<=50)result.ardiye=2900+(gun-20)*725;else if(gun<=80)result.ardiye=24650+(gun-50)*1160;else result.ardiye=59450+(gun-80)*1450;}
        return result;
    };

    window.declAutoCalc=function(){
        let val=id=>document.getElementById(id)?.value;
        let isoToTR=iso=>{if(!iso)return'';let p=iso.split('-');return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:iso;};
        let data={tarih:isoToTR(val('da-tarih')),ekSure:isoToTR(val('da-ekSure')),antTarih:isoToTR(val('da-antTarih')),beynmCif:isoToTR(val('da-beynmCif')),kiymVv:isoToTR(val('da-kiymVv')),kiymGt:isoToTR(val('da-kiymGt')),evrak:val('da-evrak')};
        if(!data.tarih)return;let m=window.calculateVehicleMetrics(data);
        let set=(id,v)=>{if(document.getElementById(id))document.getElementById(id).innerHTML=v;};
        set('da-prev-ilkSure',m.ilkSureSonu||'-');
        let kh='-';if(m.klnGun!==''&&m.klnGun!=='Süresiz'){let v=parseInt(m.klnGun);if(v<=5)kh=`<span class="text-danger font-bold">${v} Gün</span>`;else if(v<=20)kh=`<span class="text-warning">${v} Gün</span>`;else kh=`<span class="text-success">${v} Gün</span>`;}else if(m.klnGun==='Süresiz')kh='<span class="text-muted">Süresiz</span>';
        set('da-prev-klnGun',kh);set('da-prev-ardiye',window.formatNumber(m.ardiye)+' ₺');set('da-prev-sonGun',m.sonGun||'-');set('da-prev-kiymGecen',m.kiymGecen!==''?m.kiymGecen:'-');
    };

    window.sortState={col:'tarih',asc:false};
    window.sortData=function(ctx){window.sortState.asc=!window.sortState.asc;let mul=window.sortState.asc?1:-1;let pD=s=>{if(!s)return 0;let c=window.fixExcelDate(s);let p=c.split('.');return p.length===3?parseInt(p[2]+p[1]+p[0]):0;};if(ctx==='decl'){window.declarationsData.sort((a,b)=>(pD(a.tarih)-pD(b.tarih))*mul);saveData('decl');window.renderDeclarationsTable();}else if(ctx==='firm'){window.firmData[window.currentFirm].sort((a,b)=>(pD(a.tarih)-pD(b.tarih))*mul);saveData('firm');window.renderFirmVehicles();}else if(ctx==='kiymet'){window.kiymetData.sort((a,b)=>(pD(a.tarih)-pD(b.tarih))*mul);saveData('kiymet');window.renderKiymetTable();}};
    window.goToFilter=function(f){window.renderView('declarations');let el=document.getElementById('decl-status-filter');if(el){el.value=f;window.renderDeclarationsTable();}};

    let _searchTimeout=null;
    window.liveSearch=function(query){
        clearTimeout(_searchTimeout);
        let dd=document.getElementById('live-search-dropdown');if(!dd)return;
        if(!query||query.trim().length<2){dd.classList.remove('show');dd.innerHTML='';return;}
        _searchTimeout=setTimeout(()=>{
            let qWords = query.toLocaleLowerCase('tr').trim().split(/\s+/);
            let match = v => v && qWords.every(qw => v.toLocaleLowerCase('tr').includes(qw));
            let items=[];
            
            (window.declarationsData||[]).forEach((d,i)=>{
                let searchStr = `${d.sasi||''} ${d.marka||''} ${d.model||''} ${d.firma||''} ${d.beyanname||''}`;
                if(match(searchStr)) items.push({type:'decl',idx:i,title:`${d.marka||''} ${d.model||''}`.trim()||'(Araç)',sub:`${d.firma||''} · ${d.sasi||'-'}${d.beyanname?' · Byn:'+d.beyanname:''}`,badge:'Gelen',color:'var(--primary)'});
            });
            (window.kiymetData||[]).forEach((k,i)=>{
                let searchStr = `${k.sasi||''} ${k.marka||''} ${k.model||''} ${k.durum||''}`;
                if(match(searchStr)) items.push({type:'kiymet',idx:i,title:`${k.marka||''} ${k.model||''}`.trim(),sub:`Şasi: ${k.sasi||'-'}`,badge:'Kıymet',color:'var(--kiymet-color)'});
            });
            Object.keys(window.firmData||{}).forEach(fn=>{
                (window.firmData[fn]||[]).forEach((d,i)=>{
                    let searchStr = `${d.sasi||''} ${d.marka||''} ${d.model||''} ${fn}`;
                    if(match(searchStr)) items.push({type:'firm',idx:i,firmName:fn,title:`${d.marka||''} ${d.model||''}`.trim(),sub:`${fn} · ${d.sasi||'-'}`,badge:'Firma',color:'var(--success)'});
                });
            });
            
            if(!items.length){dd.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-muted);font-size:13px;">Kayıt bulunamadı</div>';}
            else{dd.innerHTML=items.slice(0,15).map(r=>`<div class="ls-item" onmousedown="window.searchGoTo('${r.type}',${r.idx},'${(r.firmName||'').replace(/'/g,"\\'")}')"><div><div class="ls-item-title">${r.title||'(Bilinmiyor)'}</div><div class="ls-item-sub">${r.sub}</div></div><span class="ls-badge" style="background:${r.color}22;color:${r.color};">${r.badge}</span></div>`).join('')+(items.length>15?`<div style="padding:10px;text-align:center;color:var(--text-muted);font-size:11px;">+${items.length-15} daha</div>`:'');}
            dd.classList.add('show');
        }, 300);
    };
    
    window.searchGoTo=function(type,idx,firmName){
        let dd=document.getElementById('live-search-dropdown');if(dd)dd.classList.remove('show');
        document.getElementById('global-search-input').value='';
        if(type==='decl'){window.renderView('declarations');setTimeout(()=>window.openDeclVehicleModal(idx,'decl'),150);}
        else if(type==='kiymet'){window.renderView('kiymetListesi');}
        else if(type==='firm'){window.currentFirm=firmName;window.renderView('firmDetails');setTimeout(()=>window.openDeclVehicleModal(idx,'firm'),150);}
    };
    window.handleGlobalSearch=function(v){window.liveSearch(v);};

    // ═══ GÜNLÜK TCMB KURU ÇEKME (CANLI DEĞİL, GÜNÜN KURU) ═══
    window.fetchTCMBKur = async function(auto = false) {
        let st = document.getElementById('kur-status');
        if(st){ st.innerHTML = '<i data-lucide="loader" style="width:10px;height:10px;animation:spin 1s linear infinite;"></i> TCMB Çekiliyor...'; st.className = 'kur-badge kur-manual'; }
        
        try {
            // TCMB today.xml'i okuyan güvenli proxy endpoint'i
            // tcmb.gov.tr'den direkt XML çekip "ForexSelling" değerlerini alır
            const proxyUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://www.tcmb.gov.tr/kurlar/today.xml");
            
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('TCMB API hatası');
            
            const data = await response.json();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data.contents, "text/xml");
            
            const currencies = xmlDoc.getElementsByTagName("Currency");
            let usdRate = null;
            let eurRate = null;
            
            for (let i = 0; i < currencies.length; i++) {
                let code = currencies[i].getAttribute("CurrencyCode");
                let sellingNode = currencies[i].getElementsByTagName("ForexSelling")[0];
                
                if (sellingNode && sellingNode.textContent) {
                    let rateStr = sellingNode.textContent;
                    let rate = parseFloat(rateStr.replace(',', '.'));
                    if (code === "USD") usdRate = rate;
                    if (code === "EUR") eurRate = rate;
                }
            }
            
            if (!usdRate || !eurRate) throw new Error('Kurlar XML içinde bulunamadı');
            
            if (document.getElementById('calc-kur-usd')) {
                document.getElementById('calc-kur-usd').value = usdRate.toFixed(4).replace('.', ',');
            }
            if (document.getElementById('calc-kur-eur')) {
                document.getElementById('calc-kur-eur').value = eurRate.toFixed(4).replace('.', ',');
            }
            
            if(st){ st.innerHTML = '✓ TCMB Döviz Satış'; st.className = 'kur-badge kur-live'; }
            
            // Başarılı çekimi kaydet
            localStorage.setItem('gumruk_tcmb_last_kur', JSON.stringify({
                usd: usdRate,
                eur: eurRate,
                date: new Date().toLocaleDateString('tr-TR')
            }));
            
            window.calculateTaxes();
            if(!auto) hideSyncToast("TCMB Günlük Satış Kuru çekildi!", true);
            
        } catch (error) {
            console.warn("TCMB Kur Çekme Hatası:", error);
            // Hata durumunda son kaydedilmiş TCMB kurunu yükle
            try {
                let lastKur = JSON.parse(localStorage.getItem('gumruk_tcmb_last_kur'));
                if (lastKur && lastKur.usd && lastKur.eur) {
                    if (document.getElementById('calc-kur-usd')) document.getElementById('calc-kur-usd').value = lastKur.usd.toFixed(4).replace('.', ',');
                    if (document.getElementById('calc-kur-eur')) document.getElementById('calc-kur-eur').value = lastKur.eur.toFixed(4).replace('.', ',');
                    if(st){ st.innerHTML = '⚠ Son TCMB Kuru (' + lastKur.date + ')'; st.className = 'kur-badge kur-manual'; }
                } else {
                    if(st){ st.innerHTML = '⚠ Manuel Kur'; st.className = 'kur-badge kur-manual'; }
                }
            } catch(e) {
                if(st){ st.innerHTML = '⚠ Manuel Kur'; st.className = 'kur-badge kur-manual'; }
            }
            
            if(!auto) hideSyncToast("TCMB Bağlantı Hatası!", false);
        }
        if(window.lucide) lucide.createIcons();
    };

    window.exportCalcExcel=function(){
        let rows=[['KALEM','DEĞER']];
        document.querySelectorAll('.calc-result-table tr').forEach(tr=>{
            let cells=tr.querySelectorAll('td');
            if(cells.length>=2)rows.push([cells[0].innerText.trim(),cells[1].innerText.trim()]);
            else if(cells.length===1)rows.push([cells[0].innerText.trim(),'']);
        });
        let fm=document.getElementById('res-genel-maliyet');if(fm)rows.push(['FİNAL MALİYET',fm.innerText]);
        let kf=document.getElementById('res-s-kesilecek-fatura');if(kf)rows.push(['KESİLECEK FATURA',kf.innerText]);
        if(typeof XLSX!=='undefined'){
            let ws=XLSX.utils.aoa_to_sheet(rows);let wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Vergi Hesaplama');
            XLSX.writeFile(wb,'Sifir_Otomobil_Maliyet_Analizi.xlsx');
        }
    };

    window.exportToWord = function() {
        const getV = id => document.getElementById(id) ? document.getElementById(id).innerText : '';
        const getI = id => document.getElementById(id) ? document.getElementById(id).value : '';
        const content = `
            <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
            <head><meta charset='utf-8'><title>Maliyet Analizi</title><style>body{font-family:Arial,sans-serif;color:#333;}h1{color:#1e3a8a;text-align:center;border-bottom:2px solid #3b82f6;padding-bottom:10px;}h3{color:#2563eb;margin-top:20px;}table{width:100%;border-collapse:collapse;margin-top:10px;}th,td{border:1px solid #cbd5e1;padding:8px 12px;text-align:left;}th{background-color:#f1f5f9;color:#0f172a;}.total-row{background-color:#e0f2fe;font-weight:bold;}.final-row{background-color:#10b981;color:white;font-weight:bold;font-size:16px;}</style></head>
            <body>
                <h1>Sıfır Otomobil İthalat Maliyet ve Vergi Analizi</h1>
                <p style="text-align: right;"><b>Tarih:</b> ${new Date().toLocaleDateString('tr-TR')}</p>
                <h3>1. Araç ve Temel Bilgiler</h3>

        'BENZİNLİ':{'0-1000':70,'1000-1500':80,'1500-1600':80,'1600-2000':150,'2000-2500':150,'2500-3000':220,'3000+':220},
        'DİZEL':{'0-1000':70,'1000-1500':80,'1500-1600':80,'1600-2000':150,'2000-2500':150,'2500-3000':220,'3000+':220},
        'ELEKTRİK':{'0-1000':25,'1000-1500':25,'1500-1600':25,'1600-2000':25,'2000-2500':55,'2500-3000':55,'3000+':55},
        'PLUG-IN':{'0-1000':45,'1000-1500':45,'1500-1600':45,'1600-2000':75,'2000-2500':75,'2500-3000':75,'3000+':75},
        'BENZİN HİBRİT':{'0-1000':70,'1000-1500':70,'1500-1600':80,'1600-2000':80,'2000-2500':150,'2500-3000':150,'3000+':150}
    };

    // ═══ STATE KALICILIĞI DÜZELTİLDİ (ÖTV'yi ve diğerlerini EZMEZ) ═══
    window.saveCalcState=function(){
        const inputs=['calc-currency','calc-kur-eur','calc-kur-usd','calc-yakit','calc-motor','calc-teslim','calc-fatura','calc-navlun','calc-sigorta','calc-yurtdisi','calc-yurtici','calc-damga','calc-otv-oran','calc-kdv-oran','calc-gv-oran','calc-ilave-gv-oran','calc-kkdf-oran','calc-atr-oran','calc-gumruk','calc-nakliye','calc-almanya','calc-ardiye-tl','calc-tse-muh-tl','calc-tse-harci-manual','calc-s-kar','calc-s-giris-kdv','calc-s-gelir-vergisi','calc-s-tescil'];
        const state={};
        inputs.forEach(id=>{let el=document.getElementById(id);if(el)state[id]=el.value;});
        let tip=document.querySelector('input[name="calc-tip"]:checked');
        if(tip)state['calc-tip']=tip.value;
        localStorage.setItem('gumruk_calc_state_v6',JSON.stringify(state)); 
    };

    window.loadCalcState=function(){
        let saved=localStorage.getItem('gumruk_calc_state_v6');
        if(!saved) return false;
        try{
            let state=JSON.parse(saved);
            Object.keys(state).forEach(id=>{
                let el=document.getElementById(id);
                if(el&&id!=='calc-tip')el.value=state[id];
            });
            if(state['calc-tip']){
                let tip=document.getElementById('tip-'+state['calc-tip'].toLowerCase());
                if(tip)tip.checked=true;
            }
            if(state['calc-teslim']){
               document.querySelectorAll('.teslim-opt').forEach(o => o.classList.remove('active'));
               let activeOpt = Array.from(document.querySelectorAll('.teslim-opt')).find(o => o.innerText === state['calc-teslim']);
               if(activeOpt) activeOpt.classList.add('active');
            }
            return true;
        }catch(e){
            return false;
        }
    };

    // SADECE MANUEL SEÇİMDE ÖTV'Yİ GÜNCELLE, İLK YÜKLEMEDE KARIŞMA
    window.updateGTIP=function(isInitialLoad = false){
        let yakit=document.getElementById('calc-yakit')?.value||'BENZİNLİ';
        let motor=document.getElementById('calc-motor')?.value||'1600-2000';
        let gtip=window.GTIP_TABLE[yakit]?.[motor]||'8703.2319.1200';
        let otv=window.OTV_SUGGEST[yakit]?.[motor]||220;
        
        let gd=document.getElementById('gtip-display');if(gd)gd.innerText='GTİP: '+gtip;
        let gm=document.getElementById('res-gtip-mini');if(gm)gm.innerText=gtip;
        
        if(!isInitialLoad) {
            let otvSel=document.getElementById('calc-otv-oran');
            if(otvSel){otvSel.value=String(otv);if(!otvSel.value)otvSel.value='220';}
        }
        window.calculateTaxes();
    };

    window.filterFirmDropdown=function(query){
        let list=document.getElementById('da-firma-list');if(!list)return;
        let firms=Object.keys(window.firmData);
        let q=query.toLocaleLowerCase('tr').trim();
        let filtered=q?firms.filter(f=>f.toLocaleLowerCase('tr').includes(q)):firms;
        list.innerHTML=filtered.map(f=>`<div class="firm-dropdown-item" onmousedown="window.selectFirm('${f.replace(/'/g,"\\'")}')">${f}</div>`).join('');
        if(!filtered.length)list.innerHTML='<div style="padding:10px 14px;color:#9ca3af;font-size:12px;">Firma bulunamadı</div>';
        list.classList.add('show');
    };
    window.selectFirm=function(name){
        document.getElementById('da-firma').value=name;
        document.getElementById('da-firma-search').value=name;
        document.getElementById('da-firma-list').classList.remove('show');
    };
    window.setTeslim=function(val,el){
        document.getElementById('da-teslim').value=val;
        el.parentElement.querySelectorAll('.teslim-opt').forEach(o=>o.classList.remove('active'));
        el.classList.add('active');
    };
    window.setCalcTeslim=function(val,el){
        document.getElementById('calc-teslim').value=val;
        el.parentElement.querySelectorAll('.teslim-opt').forEach(o=>o.classList.remove('active'));
        el.classList.add('active');
        window.calculateTaxes();
    };

    window.openVehicleCalc=function(idx){
        let d=window.declarationsData[idx];if(!d)return;
        window.renderView('calculator');
        setTimeout(()=>{
            if(d.fatura&&document.getElementById('calc-fatura')){
                document.getElementById('calc-fatura').value=window.formatNumber(d.fatura);
            }
            window.calculateTaxes();
        },100);
    };

    window.calculateTaxes=function(){
        let gV=id=>{let el=document.getElementById(id);if(!el||!el.value)return 0;return parseFloat(String(el.value).replace(/\./g,"").replace(/,/g,".").trim())||0;};
        let sH=(id,v,eur=false)=>{let el=document.getElementById(id);if(el)el.innerText=window.formatNumber(v)+(eur?' €':' ₺');};

        let currency=document.getElementById('calc-currency')?.value||'EUR';
        let kurEUR=gV("calc-kur-eur")||51.1069;
        let kurUSD=gV("calc-kur-usd")||44.3684;
        let kur=currency==='EUR'?kurEUR:kurUSD;

        let fat=gV("calc-fatura"),nav=gV("calc-navlun"),sig=gV("calc-sigorta"),yd=gV("calc-yurtdisi"),yi=gV("calc-yurtici"),dmg=gV("calc-damga");
        let otvO=gV("calc-otv-oran"),kdvO=gV("calc-kdv-oran"),atrO=gV("calc-atr-oran"),kkdf=gV("calc-kkdf-oran"),gvO=gV("calc-gv-oran"),ilvO=gV("calc-ilave-gv-oran");
        let tip=document.querySelector('input[name="calc-tip"]:checked')?.value||"AVRUPA";
        let gH=gV("calc-gumruk"),nkl=gV("calc-nakliye"),alm=gV("calc-almanya"),ardTL=gV("calc-ardiye-tl"),tseMTL=gV("calc-tse-muh-tl"),tseHTL=gV("calc-tse-harci-manual");

        let sK=gV("calc-s-kar"),sGV=gV("calc-s-gelir-vergisi"),sTsc=gV("calc-s-tescil");
        
        let teslim=document.getElementById('calc-teslim')?.value||'CIF';
        if(teslim==='CIF'){nav=0;sig=0;}

        let topD=fat+nav+sig+yd;
        let fTL=fat*kur,nTL=nav*kur,sTL=sig*kur,cif=fTL+nTL+sTL,ydTL=yd*kur;
        let gvM=cif+ydTL,araT=gvM+yi;
        let atrT=gvM*(atrO/100),gvT=gvM*(gvO/100),ilvT=gvM*(ilvO/100);
        let trt=(araT+dmg+gvT+ilvT)*0.008;
        let otvM=araT+trt+dmg+atrT+gvT+ilvT;
        let otvT=otvM*(otvO/100),kdvM=otvM+otvT,kdvT=kdvM*(kdvO/100),kkdfT=kkdf?gvM*(kkdf/100):0;
        let topV=kdvT+trt+otvT+atrT+dmg+gvT+ilvT,top=topV+kkdfT;
        let aEUR=kur?(top/kur)+topD:0,aTL=aEUR*kur;

        let mmo=tip==="DEFENDER"?60000:0,isik=tip==="AMERİKAN"?65000:0,cek=tip==="AMERİKAN"?25000:0;
        let dEUR=gH+nkl+alm+(kur?(ardTL+tseHTL+tseMTL+mmo+isik+cek)/kur:0),dTL=dEUR*kur;
        let gEUR=aEUR+dEUR,gTL=aTL+dTL;

        let sM=otvM+sK; 
        let sOTV=sM*(otvO/100);
        let sKDV=(sM+sOTV)*(kdvO/100);
        let sGirisKdv=otvM*(kdvO/100);
        
        if(document.getElementById('calc-s-giris-kdv')) document.getElementById('calc-s-giris-kdv').value = window.formatNumber(sGirisKdv);
        
        let sFat=sM+sOTV+sKDV+sGV+sTsc;

        sH("res-cif",cif);sH("res-gv-matrah",gvM);sH("res-gv-tutar",gvT);sH("res-ilave-gv",ilvT);sH("res-atr-tutar",atrT);sH("res-ara-toplam",araT);
        sH("res-trt",trt);sH("res-otv-matrahi",otvM);sH("res-otv-tutar",otvT);sH("res-kdv-matrahi",kdvM);sH("res-kdv-tutar",kdvT);sH("res-kkdf-tutar",kkdfT);
        sH("res-toplam-vergi",top);sH("res-arac-vergi-eur",aEUR,true);
        sH("res-mmo",mmo);sH("res-isik",isik);sH("res-cekici",cek);
        sH("res-diger-eur",dEUR,true);sH("res-diger-tl",dTL);sH("res-genel-eur",gEUR,true);sH("res-genel-maliyet",gTL);
        sH("res-s-toplam-matrah",sM);sH("res-s-hesaplanan-otv",sOTV);sH("res-s-otv-kdv",sKDV);
        sH("res-s-giris-kdv-out",sGirisKdv);sH("res-s-gelir-vergisi-out",sGV);sH("res-s-tescil-out",sTsc);sH("res-s-kesilecek-fatura",sFat);

        window.saveCalcState();
    };

    window.renderView=function(vn){
        localStorage.setItem('gumruk_last_view',vn);
        if(vn==='firmDetails'&&window.currentFirm)localStorage.setItem('gumruk_last_firm',window.currentFirm);
        let c=document.getElementById('view-container'),t=document.getElementById('tpl-'+vn);
        if(!t)return;c.innerHTML='';c.appendChild(t.content.cloneNode(true));
        document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===vn));
        
        if(vn==='dashboard')window.updateDashboardStats();
        if(vn==='declarations')window.renderDeclarationsTable();
        if(vn==='kiymetListesi')window.renderKiymetTable();
        if(vn==='firms')window.renderFirmsList();
        if(vn==='firmDetails'){if(document.getElementById('current-firm-title')&&window.currentFirm)document.getElementById('current-firm-title').innerText=window.currentFirm;window.renderFirmVehicles();}
        if(vn==='calculator'){
            window.updateGTIP(true); // "true" => İlk yükleme, ÖTV'yi sıfırlama
            window.loadCalcState();  // Senin kaydettiğin form değerlerini geri getir
            window.calculateTaxes(); // Son hesabı ekrana bas
        }
        if(window.lucide)lucide.createIcons();
    };

    document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.addEventListener('click',()=>{if(b.dataset.view)window.renderView(b.dataset.view);}));
    
    document.addEventListener('DOMContentLoaded',()=>{
        if(localStorage.getItem('gumruk_auth')==='true')document.getElementById('login-screen').style.display='none';
        if(window.lucide)lucide.createIcons();
        window.fetchTCMBKur(true); // Sayfa açılınca kurları otomatik çek
        if(window._firebaseReady)loadAllData();
    });
</script>
