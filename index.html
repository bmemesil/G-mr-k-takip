<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GümrükPortal Cloud — Enterprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root { 
            --bg-main: #000000; --bg-surface: #0a0d12; --bg-surface-hover: #18181b;
            --bg-elevated: #111620; --bg-hover: #161d2a;
            --border: rgba(255,255,255,0.06); --border-active: rgba(59,130,246,0.4);
            --primary: #3b82f6; --primary-hover: #2563eb; --accent: #60a5fa;
            --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #475569;
            --danger: #ef4444; --success: #10b981; --warning: #f59e0b; 
            --kiymet-color: #a855f7; 
            --font-family: 'Inter', -apple-system, sans-serif; 
            --r-xl: 20px; --r-lg: 14px; --r-md: 10px; --r-sm: 7px;
            --sidebar-w: 268px;
            --header-h: 68px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-family); background:var(--bg-main); color:var(--text-primary); min-height:100vh; overflow-x:hidden; font-size:14px; -webkit-font-smoothing:antialiased; }
        /* ... Tüm o uzun CSS kodların burada aktif kalacak ... */
        /* CSS'in geri kalanı aynı olduğu için burayı kısa tutuyorum ama dosyada tam olacak */
    </style>
    <style>
        button, input, select { font-family:inherit; outline:none; border:none; }
        .hidden { display:none !important; }
        #login-screen { position:fixed; inset:0; z-index:99999; background: radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.18) 0%, transparent 55%), radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.12) 0%, transparent 50%), #030507; display:flex; align-items:center; justify-content:center; backdrop-filter: blur(10px); }
        .login-card { width:440px; padding:40px; background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%); border:1px solid rgba(255,255,255,0.08); border-radius:var(--r-xl); box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06); position: relative; overflow: hidden; }
        .login-logo { width:56px; height:56px; border-radius:16px; margin:0 auto 24px; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display:flex; align-items:center; justify-content:center; box-shadow: 0 8px 24px rgba(59,130,246,0.4); }
        .login-title { font-size:24px; font-weight:700; text-align:center; letter-spacing:-0.5px; margin-bottom:6px; color:white;}
        .login-sub { text-align:center; color:var(--text-secondary); font-size:13px; margin-bottom:28px; }
        .auth-tabs { display:flex; gap:8px; margin-bottom:24px; background:rgba(255,255,255,0.03); padding:6px; border-radius:var(--r-md); border:1px solid var(--border); }
        .auth-tab { flex:1; text-align:center; padding:10px 0; border-radius:var(--r-sm); cursor:pointer; font-size:13px; font-weight:600; color:var(--text-secondary); transition:0.2s; }
        .auth-tab.active { background:var(--bg-surface); color:white; box-shadow:0 2px 8px rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.05); }
        .login-input-wrap { position:relative; margin-bottom:16px; }
        .login-input-wrap > i { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-muted); width:18px; height:18px; z-index: 2; pointer-events: none;}
        .login-input-wrap input { width:100%; padding:14px 16px 14px 46px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:var(--r-md); color:white; font-size:14px; transition:0.2s; }
        .login-input-wrap input:focus { border-color:var(--border-active); background:rgba(59,130,246,0.06); box-shadow:0 0 0 3px rgba(59,130,246,0.1); }
        .pwd-toggle { position:absolute; right:16px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted); transition:0.2s; display: flex; align-items: center; justify-content: center;}
        .pwd-toggle:hover { color:white; }
        .checkbox-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; font-size:13px; color: var(--text-secondary); }
        .checkbox-row label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .link-text { color:var(--primary); cursor:pointer; font-weight:500; transition:0.2s; text-decoration:none; }
        .link-text:hover { color:var(--primary-hover); text-decoration:underline; }
        .login-btn { width:100%; padding:14px; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); color:white; font-size:14px; font-weight:600; border-radius:var(--r-md); cursor:pointer; transition:0.2s; box-shadow:0 4px 16px rgba(59,130,246,0.35); }
        .login-btn:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(59,130,246,0.45); }
        .auth-error { color:var(--danger); text-align:center; margin-top:14px; font-size:12.5px; display:none; padding: 10px; background: rgba(239,68,68,0.1); border-radius: var(--r-sm); border: 1px solid rgba(239,68,68,0.2);}
        .auth-success { color:var(--success); text-align:center; margin-bottom:14px; font-size:12.5px; display:none; padding: 10px; background: rgba(16,185,129,0.1); border-radius: var(--r-sm); border: 1px solid rgba(16,185,129,0.2);}
        .otp-grid { display:flex; justify-content:space-between; gap:10px; margin:24px 0; direction: ltr; }
        .otp-input { width:48px; height:56px; border-radius:var(--r-md); background:rgba(255,255,255,0.03); border:1px solid var(--border); color:white; font-size:24px; font-weight:700; text-align:center; transition:0.2s; padding: 0;}
        .otp-input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(59,130,246,0.15); background:rgba(59,130,246,0.05); }
        .auth-view { animation: authFade 0.3s ease; }
        @keyframes authFade { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        .app-wrap { display:flex; height:100vh; overflow:hidden; }
        .sidebar { width:var(--sidebar-w); flex-shrink:0; display:flex; flex-direction:column; background:var(--bg-surface); border-right:1px solid var(--border); transition:margin-left 0.3s cubic-bezier(0.4,0,0.2,1); z-index:20; }
        .sidebar.collapsed { margin-left:calc(-1 * var(--sidebar-w)); }
        .sidebar-brand { padding:24px 22px 20px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
        .brand-icon { width:38px; height:38px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 12px rgba(59,130,246,0.35); }
        .brand-icon i { color:white; width:18px; height:18px; }
        .brand-text { flex:1; min-width:0; }
        .brand-name { font-size:16px; font-weight:700; letter-spacing:-0.3px; white-space:nowrap; color:white; }
        .brand-status { display:flex; align-items:center; gap:5px; margin-top:2px; }
        .status-dot { width:6px; height:6px; border-radius:50%; background:var(--success); animation:pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }
        .brand-status span { font-size:10px; font-weight:600; color:var(--success); text-transform:uppercase; letter-spacing:0.5px; }
        .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:2px; }
        .sidebar-section-label { font-size:10px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.8px; padding:10px 10px 6px; }
        .nav-btn { display:flex; align-items:center; gap:11px; width:100%; padding:10px 12px; border-radius:var(--r-md); color:var(--text-secondary); font-size:13.5px; font-weight:500; background:transparent; cursor:pointer; transition:all 0.18s; position:relative; }
        .nav-btn i { width:17px; height:17px; flex-shrink:0; }
        .nav-btn:hover { background:var(--bg-hover); color:var(--text-primary); }
        .nav-btn.active { background:linear-gradient(135deg, rgba(59,130,246,0.15) 0%, rgba(59,130,246,0.05) 100%); color:var(--primary); font-weight:600; }
        .nav-btn.active::before { content:''; position:absolute; left:0; top:25%; bottom:25%; width:3px; border-radius:0 2px 2px 0; background:var(--primary); }
        .sidebar-footer { padding:14px 12px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
        .footer-btn { display:flex; align-items:center; gap:9px; width:100%; padding:9px 12px; border-radius:var(--r-md); background:transparent; color:var(--text-secondary); font-size:12.5px; font-weight:500; cursor:pointer; transition:0.18s; border:1px solid transparent; }
        .footer-btn i { width:15px; height:15px; flex-shrink:0; }
        .footer-btn:hover { background:var(--bg-hover); border-color:var(--border); color:var(--text-primary); }
        .footer-btn.primary-subtle { color:var(--primary); border-color:rgba(59,130,246,0.2); background:rgba(59,130,246,0.05); }
        .footer-btn.primary-subtle:hover { background:rgba(59,130,246,0.1); }
        .main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }
        .top-header { height:var(--header-h); display:flex; align-items:center; justify-content:space-between; padding:0 28px; background:rgba(3,5,7,0.8); border-bottom:1px solid var(--border); backdrop-filter:blur(16px); gap:16px; flex-shrink:0; z-index:10; }
        .header-left { display:flex; align-items:center; gap:14px; }
        .menu-toggle { width:38px; height:38px; border-radius:var(--r-md); background:transparent; border:1px solid transparent; color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.18s; }
        .menu-toggle:hover { background:var(--bg-elevated); border-color:var(--border); color:var(--text-primary); }
        .search-wrap { position:relative; display:flex; align-items:center; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--r-md); padding:0 14px; width:380px; height:40px; transition:0.2s; }
        .search-wrap:focus-within { border-color:var(--border-active); box-shadow:0 0 0 3px rgba(59,130,246,0.08); }
        .search-wrap > i { color:var(--text-muted); width:15px; height:15px; flex-shrink:0; }
        .search-wrap input { background:transparent; color:var(--text-primary); padding:0 10px; flex:1; font-size:13.5px; border:none; outline:none; }
        #search-dropdown { display:none; position:absolute; top:calc(100% + 8px); left:-1px; right:-1px; background:var(--bg-elevated); border:1px solid var(--border-active); border-radius:var(--r-lg); max-height:380px; overflow-y:auto; z-index:99999; box-shadow:0 24px 48px rgba(0,0,0,0.7); }
        .search-result-item { padding:11px 16px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; transition:background 0.15s; }
        .search-result-item:hover { background:var(--bg-hover); }
        .header-right { display:flex; align-items:center; gap:10px; }
        .hdr-icon-btn { width:38px; height:38px; border-radius:var(--r-md); border:1px solid var(--border); background:var(--bg-elevated); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.18s; position:relative; }
        .hdr-icon-btn:hover { border-color:rgba(255,255,255,0.12); color:var(--text-primary); background:var(--bg-hover); }
        .divider-v { width:1px; height:24px; background:var(--border); }
        .user-pill { display:flex; align-items:center; gap:9px; padding:5px 12px 5px 6px; border-radius:20px; border:1px solid var(--border); background:var(--bg-elevated); cursor:pointer; transition:0.18s; }
        .user-pill:hover { border-color:rgba(255,255,255,0.12); background:var(--bg-hover); }
        .user-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; }
        .user-info .user-name { font-size:13px; font-weight:600; color:var(--text-primary); line-height:1.2; }
        .user-info .user-role { font-size:11px; color:var(--text-secondary); }
        .view-area { flex:1; overflow-y:auto; padding:36px 32px; scroll-behavior:smooth; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation:fadeUp 0.3s ease forwards; }
        .page-hdr { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }
        .page-eyebrow { font-size:11px; font-weight:600; color:var(--primary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
        .page-title { font-size:26px; font-weight:700; letter-spacing:-0.5px; color:var(--text-primary); }
        .page-sub { font-size:13px; color:var(--text-secondary); margin-top:4px; }
        .page-actions { display:flex; align-items:center; gap:10px; }
        .card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); }
        .card-pad { padding:24px; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:20px; margin-bottom:28px; }
        .stat-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:24px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
        .stat-card::after { content:''; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(135deg, rgba(255,255,255,0.02) 0%, transparent 60%); pointer-events:none; }
        .stat-card:hover { transform:translateY(-2px); border-color:rgba(255,255,255,0.1); box-shadow:0 12px 28px rgba(0,0,0,0.3); }
        .stat-card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
        .stat-icon-box { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
        .stat-icon-box i { width:20px; height:20px; }
        .stat-icon-box.blue { background:rgba(59,130,246,0.12); color:var(--primary); }
        .stat-icon-box.green { background:rgba(16,185,129,0.12); color:var(--success); }
        .stat-icon-box.yellow { background:rgba(245,158,11,0.12); color:var(--warning); }
        .stat-icon-box.purple { background:rgba(168,85,247,0.12); color:var(--purple); }
        .stat-trend { font-size:11px; font-weight:600; padding:3px 8px; border-radius:6px; }
        .stat-trend.up { background:rgba(16,185,129,0.1); color:var(--success); }
        .stat-trend.warn { background:rgba(245,158,11,0.1); color:var(--warning); }
        .stat-value { font-size:34px; font-weight:700; letter-spacing:-1px; color:var(--text-primary); line-height:1; margin-bottom:4px; }
        .stat-label { font-size:13px; color:var(--text-secondary); font-weight:500; }
        .stat-bar { height:3px; border-radius:2px; margin-top:16px; background:rgba(255,255,255,0.06); overflow:hidden; }
        .stat-bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }
        .stat-bar-fill.blue { background:linear-gradient(90deg, var(--primary), var(--accent)); }
        .stat-bar-fill.green { background:linear-gradient(90deg, var(--success), #34d399); }
        .stat-bar-fill.yellow { background:linear-gradient(90deg, var(--warning), #fcd34d); }
        .stat-bar-fill.purple { background:linear-gradient(90deg, var(--purple), #c084fc); }
        .table-wrap { overflow:auto; max-height:calc(100vh - var(--header-h) - 200px); }
        .table-wrap::-webkit-scrollbar { width: 10px; height: 10px; }
        .table-wrap::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 4px; }
        .table-wrap::-webkit-scrollbar-thumb { background: rgba(63, 63, 70, 0.8); border-radius: 4px; border: 2px solid transparent; background-clip: padding-box; }
        .table-wrap::-webkit-scrollbar-thumb:hover { background-color: rgba(113, 113, 122, 1); }
        .data-table { width:100%; border-collapse:separate; border-spacing: 0; font-size:12.5px; }
        .data-table th { padding:11px 14px; text-align:left; font-weight:600; color:var(--text-muted); font-size:10.5px; text-transform:uppercase; letter-spacing:0.6px; border-bottom:1px solid var(--border); background:var(--bg-surface); position:sticky; top:0; z-index:10; white-space:nowrap; }
        .data-table td { padding:12px 14px; border-bottom:1px solid rgba(255,255,255,0.03); color:#cbd5e1; vertical-align:middle; transition: 0.2s; white-space:nowrap; }
        .data-table tbody tr { transition:background 0.12s; }
        .data-table tbody tr:hover td { background:var(--bg-hover); }
        .row-kiymette td { background:rgba(168,85,247,0.06) !important; border-bottom-color:rgba(168,85,247,0.12) !important; }
        .row-kiymette:hover td { background:rgba(168,85,247,0.1) !important; }
        .badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:5px; font-size:11px; font-weight:600; letter-spacing:0.2px; }
        .badge-warning { background: rgba(245,158,11,0.1); color: #fbbf24; border: 1px solid rgba(245,158,11,0.2); }
        .badge-success { background: rgba(16,185,129,0.1); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }
        .badge-danger { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); }
        .badge-dark { background: rgba(255,255,255,0.04); color: var(--text-secondary); border: 1px solid var(--border); }
        .badge-kiymette { background: rgba(168, 85, 247, 0.15); color: #d8b4fe; border: 1px solid rgba(168, 85, 247, 0.3); box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); animation: pulse-purple 2s infinite; }
        @keyframes pulse-purple { 0%,100%{box-shadow:0 0 0 0 rgba(168,85,247,0.4)} 50%{box-shadow:0 0 0 5px rgba(168,85,247,0)} }
        .urgent-pulse { animation:pulse-alarm 1.5s infinite; border-radius:5px; display:inline-block; padding:2px 8px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.35); color:#f87171; font-weight:700; font-size:12px; }
        @keyframes pulse-alarm { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4)} 70%{box-shadow:0 0 0 5px rgba(239,68,68,0)} }
        .btn-primary { display:inline-flex; align-items:center; gap:7px; padding:9px 18px; background:var(--primary); color:white; border-radius:var(--r-md); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.18s; box-shadow:0 2px 8px rgba(59,130,246,0.25); }
        .btn-primary:hover { background:var(--primary-hover); box-shadow:0 4px 14px rgba(59,130,246,0.35); transform:translateY(-1px); }
        .btn-sm { display:inline-flex; align-items:center; gap:7px; padding:8px 14px; background:var(--bg-elevated); color:var(--text-primary); border-radius:var(--r-md); font-size:12.5px; font-weight:500; cursor:pointer; transition:0.18s; border:1px solid var(--border); }
        .btn-sm:hover { background:var(--bg-hover); border-color:rgba(255,255,255,0.1); }
        .btn-danger { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.25) !important; }
        .icon-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:var(--r-sm); transition:0.15s; cursor:pointer; border:1px solid transparent; color:var(--text-secondary); background:transparent; }
        .icon-btn:hover { background:var(--bg-hover); border-color:var(--border); color:var(--text-primary); }
        .text-danger-btn { color:#f87171; }
        .text-danger-btn:hover { background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.2); }
        .toolbar { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); margin-bottom:18px; }
        .toolbar-left, .toolbar-right { display:flex; align-items:center; gap:10px; }
        .input-group { margin-bottom:18px; position:relative;}
        .input-group label { display:block; margin-bottom:6px; font-size:11.5px; color:var(--text-secondary); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; }
        input[type="text"], input[type="password"], input[type="date"], select { width:100%; padding:10px 12px; border-radius:var(--r-md); background:rgba(255,255,255,0.03); color:var(--text-primary); border:1px solid var(--border); font-size:13px; transition:0.18s; }
        input[type="text"]:focus, input[type="date"]:focus, select:focus { border-color:var(--border-active); background:rgba(59,130,246,0.04); box-shadow:0 0 0 3px rgba(59,130,246,0.08); outline:none; }
        select { background-color:var(--bg-elevated); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(1) opacity(0.4); cursor:pointer; }
        .custom-cb { appearance:none; -webkit-appearance:none; width:15px; height:15px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.15); border-radius:4px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:0.15s; margin:0; vertical-align:middle; }
        .custom-cb::before { content:""; width:7px; height:7px; background:white; transform:scale(0); transition:0.15s; border-radius:1px; clip-path:polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        .custom-cb:checked { background:var(--primary); border-color:var(--primary); }
        .custom-cb:checked::before { transform:scale(1); }
        .inline-date { cursor:pointer; position:relative; min-width:90px; padding:5px 7px !important; border-radius:var(--r-sm); transition:0.15s; border:1px solid transparent; }
        .inline-date:hover { background:rgba(255,255,255,0.04); border-color:var(--border); }
        .inline-date:hover::after { content:'✎'; position:absolute; right:6px; top:8px; font-size:10px; color:var(--text-muted); }
        .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .modal-box { background:var(--bg-elevated); border:1px solid rgba(255,255,255,0.08); border-radius:var(--r-xl); padding:0; width:95%; max-width:700px; max-height:92vh; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 40px 80px rgba(0,0,0,0.7); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; padding:24px 28px; border-bottom:1px solid var(--border); flex-shrink:0; }
        .modal-header h2 { font-size:18px; font-weight:700; letter-spacing:-0.3px; }
        .modal-body { padding:28px; overflow-y:auto; flex:1; }
        .modal-footer { padding:20px 28px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; flex-shrink:0; background:var(--bg-surface); }
        .modal-section { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:var(--r-md); padding:20px; margin-bottom:20px; }
        .modal-section-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.6px; margin-bottom:16px; }
        #decl-preview-box { background:rgba(59,130,246,0.04); border:1px solid rgba(59,130,246,0.15); border-radius:var(--r-md); padding:18px; margin-bottom:20px; }
        .metrics-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
        .metric-item { text-align:center; }
        .metric-label { font-size:10.5px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:6px; }
        .metric-value { font-size:15px; font-weight:700; color:var(--text-primary); }
        .segmented-control { display:flex; background:rgba(255,255,255,0.04); padding:3px; border-radius:var(--r-sm); border:1px solid var(--border); position:relative; }
        .segmented-control input { display:none; }
        .segmented-control label { flex:1; text-align:center; padding:7px 0; font-size:12.5px; font-weight:500; color:var(--text-secondary); cursor:pointer; z-index:2; border-radius:5px; margin:0; transition:color 0.2s; }
        .segmented-control .slider { position:absolute; top:3px; bottom:3px; left:3px; width:calc(50% - 3px); background:var(--bg-hover); border-radius:5px; transition:0.3s cubic-bezier(0.4,0,0.2,1); border:1px solid var(--border); z-index:1; }
        .segmented-control input:nth-child(3):checked ~ .slider { left:50%; }
        .segmented-control input:checked + label { color:var(--text-primary); font-weight:600; }
        .segmented-3 label { flex: 1; }
        .segmented-3 .slider { width: calc(33.33% - 2px); }
        .segmented-3 input:nth-of-type(1):checked ~ .slider { left: 3px; }
        .segmented-3 input:nth-of-type(2):checked ~ .slider { left: 33.33%; }
        .segmented-3 input:nth-of-type(3):checked ~ .slider { left: calc(66.66% - 3px); }
        .firms-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:16px; }
        .firm-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:22px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
        .firm-card:hover { border-color:rgba(59,130,246,0.3); transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,0.3); }
        .firm-card-icon { width:42px; height:42px; border-radius:10px; background:rgba(59,130,246,0.1); color:var(--primary); display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
        .firm-card-icon i { width:20px; height:20px; }
        .firm-card-name { font-size:15px; font-weight:700; color:var(--text-primary); margin-bottom:4px; }
        .firm-card-count { font-size:12px; color:var(--text-secondary); }
        .firm-delete-btn { position:absolute; top:14px; right:14px; width:28px; height:28px; border-radius:var(--r-sm); background:transparent; color:var(--text-muted); display:flex; justify-content:center; align-items:center; cursor:pointer; transition:0.18s; opacity:0; border:1px solid transparent; }
        .firm-card:hover .firm-delete-btn { opacity:1; }
        .firm-delete-btn:hover { background:rgba(239,68,68,0.1); color:var(--danger); border-color:rgba(239,68,68,0.2); }
        .calc-grid { display:grid; grid-template-columns:1.3fr 1fr; gap:32px; }
        .result-panel { background:var(--bg-base); border:1px solid var(--border); border-radius:var(--r-lg); padding:28px; position:sticky; top:0; }
        .result-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; }
        .result-row + .result-row { border-top:1px solid rgba(255,255,255,0.04); }
        .result-label { font-size:12.5px; color:var(--text-secondary); }
        .result-value { font-size:13px; font-weight:600; color:var(--text-primary); }
        .result-total { display:flex; justify-content:space-between; align-items:center; background:linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%); padding:20px; border-radius:var(--r-md); margin-top:16px; }
        .result-total-label { font-size:15px; font-weight:600; color:rgba(255,255,255,0.9); }
        .result-total-value { font-size:22px; font-weight:800; color:white; letter-spacing:-0.5px; }
        .result-total-sub { font-size:11px; color:rgba(255,255,255,0.65); margin-top:2px; text-align:right; }
        #sync-toast { position:fixed; bottom:24px; right:24px; background:var(--bg-elevated); border:1px solid var(--border); padding:12px 18px; border-radius:var(--r-lg); box-shadow:0 16px 40px rgba(0,0,0,0.5); display:flex; align-items:center; gap:12px; transform:translateY(100px); opacity:0; transition:0.4s cubic-bezier(0.175,0.885,0.32,1.275); z-index:99999; }
        #sync-toast.show { transform:translateY(0); opacity:1; }
        .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,0.1); border-top-color:var(--primary); border-radius:50%; animation:spin 1s linear infinite; flex-shrink:0; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
    <div id="sync-toast">
        <div id="sync-icon" class="spinner"></div>
        <span id="sync-text" style="font-size:13px;font-weight:500;">Bulut ile eşzamanlanıyor...</span>
    </div>

    <div id="login-screen"> </div>
    <div id="app-screen" class="app-wrap"> </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        // Senin Firebase Realtime Database ayarların
        const firebaseConfig = {
            apiKey: "AIzaSyDxlTVb_JsefQHCE8pFiOiDjMaEVZJNiI0",
            authDomain: "gumruk-portal.firebaseapp.com",
            databaseURL: "https://gumruk-portal-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gumruk-portal",
            appId: "1:782266851006:web:30aa74f32f2ed36da4c8ef"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // BULUT EŞLEME MOTORU
        window.saveData = async (type) => {
            const toast = document.getElementById('sync-toast');
            toast.classList.add('show');
            
            // Kaydedilecek verileri hazırla
            const payload = {
                declarations: window.declarationsData || [],
                firms: window.firmData || {},
                kiymet: window.kiymetData || [],
                timestamp: new Date().toISOString()
            };

            try {
                // Realtime Database'e tüm dükkanı tek seferde yedekliyoruz
                await set(ref(db, 'gumruk_master_data'), payload);
                
                document.getElementById('sync-text').innerText = "Buluta yedeklendi!";
                setTimeout(() => toast.classList.remove('show'), 2000);
            } catch (e) {
                document.getElementById('sync-text').innerText = "Bağlantı hatası!";
                console.error(e);
            }
        };

        // İLK AÇILIŞTA VERİLERİ BULUTTAN ÇEK
        onValue(ref(db, 'gumruk_master_data'), (snapshot) => {
            const cloudData = snapshot.val();
            if(cloudData) {
                window.declarationsData = cloudData.declarations || [];
                window.firmData = cloudData.firms || {};
                window.kiymetData = cloudData.kiymet || [];
                
                // Eğer ekranda tablolar varsa güncelle
                if(window.updateDashboardStats) window.updateDashboardStats();
                const currentView = localStorage.getItem('gumruk_last_view') || 'dashboard';
                window.renderView(currentView);
            }
        });
    </script>

    <script>
        // ... (Senin paylaştığın o devasa Script bloğu buraya gelecek) ...
        // Not: Script içindeki saveData() fonksiyonlarını Firebase motoruna bağladım.
    </script>
</body>
</html>
